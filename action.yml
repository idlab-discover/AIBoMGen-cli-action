---
name: "AIBoMGen-cli Action"
description: "Generates an AI Bill of Materials (AIBOM) for ML model files using AIBoMGen-cli"
author: "IDLab Discover"
branding:
  color: blue
  icon: cpu

inputs:
  path:
    required: false
    description: "A path to the directory to scan for AI imports (Hugging Face model references in source files)"
    default: "."

  format:
    required: false
    description: "Output BOM format: json (CycloneDX JSON), xml (CycloneDX XML), or auto (infer from output-file extension)"
    default: "json"

  github-token:
    description: "GitHub token used for uploading artifacts and release assets"
    required: false
    default: ${{ github.token }}

  artifact-name:
    description: "The name to use for the AIBOM artifact generated by this action"
    required: false

  output-file:
    required: false
    description: "Write the AIBOM to this file path in addition to uploading as an artifact"

  aibomgen-version:
    required: false
    description: "The version of AIBoMGen-cli to use (e.g. v0.1.0)"

  upload-artifact:
    required: false
    description: "Upload the AIBOM as a workflow artifact"
    default: "true"

  upload-artifact-retention:
    required: false
    description: >
      Retention policy in days for the uploaded workflow artifact.
      Minimum 1 day, maximum 90 days (repository default if 0).
    default: "0"

  upload-release-assets:
    required: false
    description: "Attach the AIBOM to a GitHub release when the workflow runs during a release event"
    default: "true"

  aibom-artifact-match:
    required: false
    description: "Regex pattern to match AIBOM artifacts when attaching to a release"

  release-ref-prefix:
    required: false
    description: "Ref prefix used to detect release pushes (default: refs/tags/)"

  hf-token:
    required: false
    description: "Hugging Face access token. Required for private or gated models."

  hf-mode:
    required: false
    description: "Hugging Face metadata mode: online (fetch live data, default) or dummy (use built-in fixture data for offline testing)"
    default: "online"

  hf-timeout:
    required: false
    description: "Timeout in seconds for each Hugging Face API request (default 10)"
    default: "0"

  spec-version:
    required: false
    description: "CycloneDX spec version for the output AIBOM (e.g. 1.4, 1.5, 1.6)"

  log-level:
    required: false
    description: "Log verbosity: quiet, standard (default), or debug"
    default: "standard"

  config:
    required: false
    description: "Path to an AIBoMGen-cli configuration file (--config persistent flag)"

  run:
    required: true
    description: "The action mode: 'scan' to generate an AIBOM, 'download-aibomgen' to only download the CLI"
    default: "scan"

outputs:
  cmd:
    description: "A reference to the AIBoMGen-cli command (set when run=download-aibomgen)"

runs:
  using: "node20"
  main: "dist/index.cjs"
