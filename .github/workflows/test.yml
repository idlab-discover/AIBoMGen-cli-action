name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Format check
        run: npm run format-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Ensure dist is up to date
        run: |
          git diff --exit-code dist/ || \
          (echo "ERROR: dist/ is out of date. Run 'npm run package' and commit the result." && exit 1)
